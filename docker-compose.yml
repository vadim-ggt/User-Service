version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: user-service-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-cache:
    image: redis:7.2-alpine
    container_name: user-service-redis
    ports:
      - "${REDIS_PORT}:6379"

  user-service:
    env_file:
      - .env #почемуто буз этого не работает но ладно
    container_name: user-service-app
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_NAME: ${DB_NAME}
      APP_PORT: ${APP_PORT}
      DOCKER_DB_HOST: postgres-db
      DOCKER_REDIS_HOST: redis-cache
      DB_HOST_PORT: ${DB_HOST_PORT}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - postgres-db
      - redis-cache

volumes:
  pgdata:
